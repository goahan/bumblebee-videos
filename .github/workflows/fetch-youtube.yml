name: Fetch YouTube Videos
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch YouTube API (all pages)
        env:
          API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os

          api_key = os.environ['API_KEY']
          playlist_id = "PLYa3Kda6HghorPMRGwL4cAM5F3U6L2bve"
          all_items = []
          page_token = ""

          while True:
              url = f"https://www.googleapis.com/youtube/v3/playlistItems?key={api_key}&playlistId={playlist_id}&part=snippet&maxResults=50"
              if page_token:
                  url += f"&pageToken={page_token}"
              with urllib.request.urlopen(url) as res:
                  data = json.loads(res.read())
              all_items.extend(data.get("items", []))
              page_token = data.get("nextPageToken", "")
              if not page_token:
                  break

          with open("videos.json", "w") as f:
              json.dump({"items": all_items}, f)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add videos.json
          git diff --staged --quiet || git commit -m "Update YouTube videos"
          git push
